name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Type-check & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 26
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc -b

      - name: Run tests
        run: npm test
