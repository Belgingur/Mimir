# Example configuration for netcdf2image.py

# Model and output
model: RAP
out_root: ./

# Processing
#export_all: true
jobs: 9
#history_interval: 60

# Paths
weights_dir: ./weights
scaling_policy_yml: ./manifest_scaling_v2.yml

# Variable selection
include: 
 - air_temperature_at_2m_agl
 - wind_from_direction_at_10m_agl
 - wind_speed_at_10m_agl
 - lwe_precipitation_rate
 - lwe_snow_change
 # - air_pressure_at_sea_level
 - cloud_area_fraction
# - relative_humidity_at_2m_agl
 - lwe_snow_depth
# - visibility_in_air_at_2m_agl
# - wind_speed_of_gust_at_10m_agl
 - U_true_at_10m_agl
 - V_true_at_10m_agl
#exclude: []

# Output format
format: WEBP

# Regridding
no_regrid: false
target_bounds: null
#target_res_deg: 0.02
target_shape: null
#regrid_method: bilinear
regrid_method: nearest
detail_scale: 1.0

# Debugging / logging
debug: false
verbose: true
